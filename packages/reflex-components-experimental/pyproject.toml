[project]
name = "reflex-components-experimental"
dynamic = ["version"]
description = "Experimental Reflex components: Base UI + atomic Tailwind, parity-matched to Radix Themes."
license.text = "Apache-2.0"
readme = "README.md"
authors = [{ name = "Khaleel Al-Adhami", email = "khaleel@reflex.dev" }]
maintainers = [{ name = "Khaleel Al-Adhami", email = "khaleel@reflex.dev" }]
requires-python = ">=3.10"
dependencies = [
    "reflex >= 0.9.0",
]

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
pattern-prefix = "reflex-components-experimental-"
fallback-version = "0.0.0dev0"

[tool.hatch.build]
artifacts = ["*.css"]
targets.sdist.artifacts = ["*.pyi", "*.css"]
targets.wheel.artifacts = ["*.pyi", "*.css"]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0"]
build-backend = "hatchling.build"
